text_sensor:
  - platform: homeassistant
    id: metno_condition
    entity_id: weather.forecast_home
  - platform: homeassistant
    id: calendar_joan_message
    entity_id: calendar.joan
    attribute: message
  - platform: homeassistant
    id: calendar_joan_start_time
    entity_id: calendar.joan
    attribute: start_time
  - platform: homeassistant
    id: calendar_joan_all_day
    entity_id: calendar.joan
    attribute: all_day
  - platform: homeassistant
    id: calendar_birthdays_message
    entity_id: calendar.birthdays
    attribute: message
  - platform: homeassistant
    id: calendar_birthdays_start_time
    entity_id: calendar.birthdays
    attribute: start_time
  - platform: homeassistant
    id: calendar_birthdays_all_day
    entity_id: calendar.birthdays
    attribute: all_day
  # Opcionales: si creas estos sensores template en HA, se mostraran en rotacion.
  - platform: homeassistant
    id: calendar_extra_line_1
    entity_id: sensor.rellotge_calendar_line_1
  - platform: homeassistant
    id: calendar_extra_line_2
    entity_id: sensor.rellotge_calendar_line_2
  - platform: homeassistant
    id: calendar_extra_line_3
    entity_id: sensor.rellotge_calendar_line_3
